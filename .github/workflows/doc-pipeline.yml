name: Doc Pipeline

on:
  workflow_call:
    inputs:
      full_generation:
        type: boolean
        default: false
        description: "Generate pages for ALL packages, not just changed ones"
    secrets:
      OPENAI_API_KEY:
        required: false
      WIKIJS_API_KEY:
        required: false

jobs:
  detect-and-generate:
    runs-on: arc-runner-set

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Checkout doc-pipeline scripts
        uses: actions/checkout@v4
        with:
          repository: MareAnalytica/doc-pipeline
          path: .doc-pipeline
          token: ${{ github.token }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Detect Languages
        id: detect
        run: |
          HAS_GO=false; HAS_TS=false; HAS_PYTHON=false; HAS_PROTO=false; HAS_HELM=false
          GO_SRC_ROOT="."; TS_SRC_ROOT="."; PY_SRC_ROOT="."

          # Check root AND common subdirectories for language marker files
          PY_ROOT_COUNT=0
          PY_BEST_ROOT="."
          PY_BEST_COUNT=0
          for dir in . backend api frontend src app; do
            if [ -f "$dir/go.mod" ]; then
              HAS_GO=true
              [ "$dir" != "." ] && GO_SRC_ROOT="$dir"
            fi
            if [ -f "$dir/tsconfig.json" ]; then
              HAS_TS=true
              [ "$dir" != "." ] && TS_SRC_ROOT="$dir"
            fi
            if [ -f "$dir/pyproject.toml" ] || [ -f "$dir/setup.py" ] || [ -f "$dir/requirements.txt" ]; then
              HAS_PYTHON=true
              if [ "$dir" != "." ]; then
                PY_ROOT_COUNT=$((PY_ROOT_COUNT + 1))
                # Track the subdirectory with the most .py files
                DIR_PY_COUNT=$(find "$dir" -name "*.py" -maxdepth 3 -not -path "*/__pycache__/*" -not -path "*/venv/*" 2>/dev/null | wc -l)
                if [ "$DIR_PY_COUNT" -gt "$PY_BEST_COUNT" ]; then
                  PY_BEST_COUNT=$DIR_PY_COUNT
                  PY_BEST_ROOT="$dir"
                fi
              fi
            fi
          done
          # If multiple subdirs have Python markers, scan from root to get them all
          if [ "$PY_ROOT_COUNT" -gt 1 ]; then
            PY_SRC_ROOT="."
          elif [ "$PY_ROOT_COUNT" -eq 1 ]; then
            PY_SRC_ROOT="$PY_BEST_ROOT"
          fi

          # Fallback: check for .py files directly if no marker found
          if [ "$HAS_PYTHON" = "false" ]; then
            if find . -name "*.py" -maxdepth 3 -not -path "*/venv/*" -not -path "*/__pycache__/*" -not -path "*/node_modules/*" | grep -q .; then
              HAS_PYTHON=true
              # Find the best source root (directory with the most .py files)
              for candidate in app backend src api .; do
                if [ -d "$candidate" ] && find "$candidate" -name "*.py" -maxdepth 2 | grep -q .; then
                  PY_SRC_ROOT="$candidate"
                  break
                fi
              done
            fi
          fi

          find . -name "*.proto" -maxdepth 3 | grep -q . && HAS_PROTO=true
          [ -f "Chart.yaml" ] && HAS_HELM=true

          echo "has_go=$HAS_GO" >> $GITHUB_OUTPUT
          echo "has_ts=$HAS_TS" >> $GITHUB_OUTPUT
          echo "has_python=$HAS_PYTHON" >> $GITHUB_OUTPUT
          echo "has_proto=$HAS_PROTO" >> $GITHUB_OUTPUT
          echo "has_helm=$HAS_HELM" >> $GITHUB_OUTPUT
          echo "go_src_root=$GO_SRC_ROOT" >> $GITHUB_OUTPUT
          echo "ts_src_root=$TS_SRC_ROOT" >> $GITHUB_OUTPUT
          echo "py_src_root=$PY_SRC_ROOT" >> $GITHUB_OUTPUT
          echo "Detected: go=$HAS_GO($GO_SRC_ROOT) ts=$HAS_TS($TS_SRC_ROOT) python=$HAS_PYTHON($PY_SRC_ROOT) proto=$HAS_PROTO helm=$HAS_HELM"

      - name: Install Go doc tools
        if: steps.detect.outputs.has_go == 'true' || steps.detect.outputs.has_proto == 'true' || steps.detect.outputs.has_helm == 'true'
        run: |
          [ "${{ steps.detect.outputs.has_go }}" == "true" ] && go install github.com/princjef/gomarkdoc/cmd/gomarkdoc@latest
          [ "${{ steps.detect.outputs.has_proto }}" == "true" ] && go install github.com/pseudomuto/protoc-gen-doc/cmd/protoc-gen-doc@latest
          [ "${{ steps.detect.outputs.has_helm }}" == "true" ] && go install github.com/norwoodj/helm-docs/cmd/helm-docs@latest
          true

      - name: Install Node doc tools
        if: steps.detect.outputs.has_ts == 'true'
        run: npm install -g typedoc typedoc-plugin-markdown

      - name: Install Python doc tools
        if: steps.detect.outputs.has_python == 'true'
        run: pip install pydoc-markdown

      - name: Generate Go docs
        if: steps.detect.outputs.has_go == 'true'
        continue-on-error: true
        run: |
          mkdir -p docs/go
          GO_ROOT="${{ steps.detect.outputs.go_src_root }}"
          echo "Go source root: $GO_ROOT"
          cd "$GO_ROOT"
          go version
          go mod download || true

          # Build exclude list: directories with only _test.go files (no source packages)
          EXCLUDE_ARGS=""
          while IFS= read -r dir; do
            # Count non-test .go files
            SRC_COUNT=$(find "$dir" -maxdepth 1 -name "*.go" ! -name "*_test.go" 2>/dev/null | wc -l)
            if [ "$SRC_COUNT" -eq 0 ]; then
              EXCLUDE_ARGS="$EXCLUDE_ARGS --exclude-dirs ./${dir}"
              echo "Excluding test-only dir: $dir"
            fi
          done < <(find . -name "*.go" -exec dirname {} \; 2>/dev/null | sort -u | sed 's|^\./||')

          # Try ./... first (with excludes), then fall back to subdirectories
          gomarkdoc $EXCLUDE_ARGS ./... > "${GITHUB_WORKSPACE}/docs/go/packages.md" 2>/dev/null || true
          if [ ! -s "${GITHUB_WORKSPACE}/docs/go/packages.md" ]; then
            for dir in ./internal/... ./cmd/... ./pkg/... ./src/...; do
              if ls ${dir%/...} 2>/dev/null | grep -q .; then
                gomarkdoc $EXCLUDE_ARGS "$dir" >> "${GITHUB_WORKSPACE}/docs/go/packages.md" 2>/dev/null || true
              fi
            done
          fi
          cd "${GITHUB_WORKSPACE}"
          echo "Go docs: $(wc -c < docs/go/packages.md 2>/dev/null || echo 0) bytes"

      - name: Install project Node dependencies
        if: steps.detect.outputs.has_ts == 'true'
        run: |
          TS_ROOT="${{ steps.detect.outputs.ts_src_root }}"
          # Install deps from whichever directory has the package.json
          for check_dir in "$TS_ROOT" .; do
            if [ -f "$check_dir/package-lock.json" ]; then
              cd "$check_dir"
              npm ci --ignore-scripts 2>/dev/null || npm install --ignore-scripts
              cd "${GITHUB_WORKSPACE}"
              break
            elif [ -f "$check_dir/package.json" ]; then
              cd "$check_dir"
              npm install --ignore-scripts
              cd "${GITHUB_WORKSPACE}"
              break
            fi
          done

      - name: Generate TypeScript docs
        if: steps.detect.outputs.has_ts == 'true'
        continue-on-error: true
        run: |
          mkdir -p docs/ts
          TS_ROOT="${{ steps.detect.outputs.ts_src_root }}"
          cd "$TS_ROOT"

          # Collect all source directories that contain .ts/.tsx files.
          # Next.js apps use app/, components/, hooks/, lib/ at root level
          # rather than putting everything under src/.
          ENTRY_POINTS=""
          for candidate in src app components hooks lib pages; do
            if [ -d "$candidate" ]; then
              # Skip generated/auto-generated directories
              TS_COUNT=$(find "$candidate" -name "*.ts" -o -name "*.tsx" 2>/dev/null | grep -v node_modules | grep -v generated | wc -l)
              if [ "$TS_COUNT" -gt 0 ]; then
                ENTRY_POINTS="$ENTRY_POINTS $candidate"
              fi
            fi
          done
          # Fallback: use current directory
          [ -z "$ENTRY_POINTS" ] && ENTRY_POINTS="."

          echo "TypeScript entry points: $ENTRY_POINTS"

          # --skipErrorChecking: bypass TS errors from CSS imports, deprecated options, etc.
          # --entryPointStrategy expand: recursively find all .ts/.tsx files in entry point
          npx typedoc --json "${GITHUB_WORKSPACE}/docs/ts/typedoc.json" \
            --entryPointStrategy expand \
            --skipErrorChecking \
            $ENTRY_POINTS 2>&1 || true

          npx typedoc --plugin typedoc-plugin-markdown \
            --out "${GITHUB_WORKSPACE}/docs/ts/markdown" \
            --entryPointStrategy expand \
            --skipErrorChecking \
            $ENTRY_POINTS 2>&1 || true

          cd "${GITHUB_WORKSPACE}"
          echo "TypeScript docs: $(find docs/ts -type f | wc -l) files, $(du -sh docs/ts 2>/dev/null | cut -f1) total"

      - name: Generate Python docs
        if: steps.detect.outputs.has_python == 'true'
        continue-on-error: true
        run: |
          mkdir -p docs/python
          PY_ROOT="${{ steps.detect.outputs.py_src_root }}"

          # Find the source root within PY_ROOT (check for src/ subdir first)
          if [ -d "$PY_ROOT/src" ] && find "$PY_ROOT/src" -name "*.py" -maxdepth 3 | grep -q .; then
            SRC_ROOT="$PY_ROOT/src"
          elif [ -d "$PY_ROOT/app" ] && find "$PY_ROOT/app" -name "*.py" -maxdepth 3 | grep -q .; then
            SRC_ROOT="$PY_ROOT"
          elif [ "$PY_ROOT" != "." ]; then
            SRC_ROOT="$PY_ROOT"
          else
            # Original fallback for root-level projects
            if [ -d "src" ] && find src -name "*.py" -maxdepth 3 | grep -q .; then
              SRC_ROOT="src"
            else
              SRC_ROOT="."
            fi
          fi

          # If SRC_ROOT is a subdirectory, check if siblings also have .py files
          if [ "$SRC_ROOT" != "." ]; then
            PARENT=$(dirname "$SRC_ROOT")
            for sibling in "$PARENT"/*/; do
              sibling="${sibling%/}"
              if [ -d "$sibling" ] && [ "$sibling" != "$SRC_ROOT" ]; then
                SIBLING_PY=$(find "$sibling" -name "*.py" -maxdepth 3 -not -path "*/__pycache__/*" -not -path "*/venv/*" -not -path "*/node_modules/*" 2>/dev/null | wc -l)
                if [ "$SIBLING_PY" -gt 0 ]; then
                  echo "Found $SIBLING_PY .py files in sibling $sibling -- broadening to repo root"
                  SRC_ROOT="."
                  break
                fi
              fi
            done
          fi

          echo "Python source root: $SRC_ROOT"

          # Document individual .py files (not just __init__.py packages)
          # This catches all actual code, not just empty package markers
          find "$SRC_ROOT" -name "*.py" -maxdepth 4 \
            -not -name "__init__.py" \
            -not -name "conftest.py" \
            -not -name "setup.py" \
            -not -path "*/venv/*" \
            -not -path "*/.venv/*" \
            -not -path "*/__pycache__/*" \
            -not -path "*/node_modules/*" \
            -not -path "*/migrations/*" \
            -not -path "*/test*" | while read -r pyfile; do
            module=$(echo "$pyfile" | sed "s|^${SRC_ROOT}/||; s|/|.|g; s|\.py$||")
            outname=$(echo "$module" | tr '.' '_')
            pydoc-markdown -I "$SRC_ROOT" -m "$module" > "docs/python/${outname}.md" 2>/dev/null || true
          done

          # Remove empty/tiny files (< 100 bytes = just a header)
          find docs/python -name "*.md" -size -100c -delete 2>/dev/null || true

          COUNT=$(find docs/python -name "*.md" -type f | wc -l)
          SIZE=$(du -sh docs/python 2>/dev/null | cut -f1)
          echo "Python docs: ${COUNT} files, ${SIZE} total"

      - name: Generate Protobuf docs
        if: steps.detect.outputs.has_proto == 'true'
        continue-on-error: true
        run: |
          mkdir -p docs/proto
          find . -name "*.proto" -exec protoc --doc_out=docs/proto --doc_opt=json,proto-docs.json {} + || true

      - name: Generate Helm docs
        if: steps.detect.outputs.has_helm == 'true'
        continue-on-error: true
        run: |
          mkdir -p docs/helm
          helm-docs --output-file docs/helm/README.md || true

      - name: Install pipeline dependencies
        run: pip3 install httpx

      - name: Test RAGAnything connectivity
        id: rag_check
        run: |
          echo "Testing RAGAnything at raganything.memory.svc.cluster.local:9621..."
          if curl -sf http://raganything.memory.svc.cluster.local:9621/health --connect-timeout 5 -o /dev/null; then
            echo "RAGAnything is reachable"
            echo "reachable=true" >> $GITHUB_OUTPUT
          else
            echo "WARNING: RAGAnything is NOT reachable from this runner"
            echo "reachable=false" >> $GITHUB_OUTPUT
            echo "Trying alternate DNS..."
            getent hosts raganything.memory.svc.cluster.local || echo "DNS resolution failed"
            curl -sv http://raganything.memory.svc.cluster.local:9621/health --connect-timeout 5 2>&1 || true
          fi

      - name: Direct graph injection (deterministic)
        if: steps.rag_check.outputs.reachable == 'true'
        continue-on-error: true
        run: |
          python3 .doc-pipeline/scripts/transform.py docs/ \
            --repo ${{ github.event.repository.name }} \
            --commit ${{ github.sha }} \
            --output-format graph > /tmp/graph-output.json

          python3 -c "
          import json, urllib.request, sys
          data = json.load(open('/tmp/graph-output.json'))
          base = 'http://raganything.memory.svc.cluster.local:9621'

          created = skipped = 0
          for ent in data.get('entities', []):
              body = json.dumps(ent).encode()
              req = urllib.request.Request(f'{base}/graph/entity/create', data=body, headers={'Content-Type': 'application/json'}, method='POST')
              try:
                  urllib.request.urlopen(req, timeout=15)
                  created += 1
              except urllib.error.HTTPError as e:
                  if e.code == 400: skipped += 1
                  else: print(f'FAIL: {ent[\"entity_name\"]}: {e}', file=sys.stderr)
          print(f'Entities: {created} created, {skipped} existed')

          rel_ok = 0
          for rel in data.get('relationships', []):
              body = json.dumps(rel).encode()
              req = urllib.request.Request(f'{base}/graph/relation/create', data=body, headers={'Content-Type': 'application/json'}, method='POST')
              try:
                  urllib.request.urlopen(req, timeout=15)
                  rel_ok += 1
              except Exception as e:
                  print(f'FAIL rel: {e}', file=sys.stderr)
          print(f'Relations: {rel_ok} created')
          "

      - name: Transform and ingest into RAGAnything
        if: steps.rag_check.outputs.reachable == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python3 .doc-pipeline/scripts/transform.py docs/ \
            --repo ${{ github.event.repository.name }} \
            --commit ${{ github.sha }} > /tmp/transform-output.jsonl

          DOC_COUNT=$(wc -l < /tmp/transform-output.jsonl)
          echo "Transform produced ${DOC_COUNT} documents"

          if [ "$DOC_COUNT" -eq 0 ]; then
            echo "No documents to ingest"
            exit 0
          fi

          # Convert and ingest each document using temp files (avoids shell arg length limits)
          python3 -c "
          import json, urllib.request, sys
          count = 0
          for line in open('/tmp/transform-output.jsonl'):
              doc = json.loads(line.strip())
              api_doc = {
                  'text': doc.get('content', ''),
                  'file_source': doc.get('metadata', {}).get('repo', 'unknown') + '/' + doc.get('metadata', {}).get('source_file', 'unknown')
              }
              body = json.dumps(api_doc).encode()
              req = urllib.request.Request(
                  'http://raganything.memory.svc.cluster.local:9621/documents/text',
                  data=body,
                  headers={'Content-Type': 'application/json'},
                  method='POST'
              )
              try:
                  resp = urllib.request.urlopen(req, timeout=30)
                  result = json.loads(resp.read())
                  count += 1
                  print(f'Ingested: {api_doc[\"file_source\"][:60]} -> {result.get(\"status\", \"?\")}')
              except Exception as e:
                  print(f'FAILED: {api_doc[\"file_source\"][:60]} -> {e}', file=sys.stderr)
          print(f'Total ingested: {count}')
          "

      - name: Generate and publish Wiki.js pages
        if: steps.rag_check.outputs.reachable == 'true'
        continue-on-error: true
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          WIKIJS_API_KEY: ${{ secrets.WIKIJS_API_KEY }}
        run: |
          FULL_FLAG=""
          if [ "${{ inputs.full_generation }}" == "true" ]; then
            FULL_FLAG="--full"
          fi
          # Also detect [full-docs] in commit message (works with push events where secrets pass through)
          COMMIT_MSG=$(git log -1 --pretty=%B 2>/dev/null || echo "")
          if echo "$COMMIT_MSG" | grep -qi '\[full-docs\]'; then
            echo "Detected [full-docs] in commit message -- enabling full generation"
            FULL_FLAG="--full"
          fi
          python3 .doc-pipeline/scripts/generate_wiki_pages.py \
            --repo ${{ github.event.repository.name }} \
            --docs-dir docs/ \
            --source-dir . \
            --raganything-url http://raganything.memory.svc.cluster.local:9621 \
            --wikijs-url http://wikijs.docs.svc.cluster.local:3000 \
            $FULL_FLAG

      - name: Ingest Wiki.js pages back into RAGAnything
        if: steps.rag_check.outputs.reachable == 'true'
        continue-on-error: true
        env:
          WIKIJS_API_KEY: ${{ secrets.WIKIJS_API_KEY }}
        run: |
          python3 .doc-pipeline/scripts/ingest_wikijs_to_rag.py \
            --wikijs-url http://wikijs.docs.svc.cluster.local:3000 \
            --raganything-url http://raganything.memory.svc.cluster.local:9621

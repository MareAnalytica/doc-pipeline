name: Doc Pipeline

on:
  workflow_call:
    inputs:
      full_generation:
        type: boolean
        default: false
        description: "Generate pages for ALL packages, not just changed ones"
    secrets:
      OPENAI_API_KEY:
        required: false
      WIKIJS_API_KEY:
        required: false

jobs:
  detect-and-generate:
    runs-on: arc-runner-set

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Checkout doc-pipeline scripts
        uses: actions/checkout@v4
        with:
          repository: MareAnalytica/doc-pipeline
          path: .doc-pipeline
          token: ${{ github.token }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Detect Languages
        id: detect
        run: |
          HAS_GO=false; HAS_TS=false; HAS_PYTHON=false; HAS_PROTO=false; HAS_HELM=false

          [ -f "go.mod" ] && HAS_GO=true
          [ -f "tsconfig.json" ] && HAS_TS=true
          ([ -f "pyproject.toml" ] || [ -f "setup.py" ] || [ -f "requirements.txt" ]) && HAS_PYTHON=true
          find . -name "*.proto" -maxdepth 3 | grep -q . && HAS_PROTO=true
          [ -f "Chart.yaml" ] && HAS_HELM=true

          echo "has_go=$HAS_GO" >> $GITHUB_OUTPUT
          echo "has_ts=$HAS_TS" >> $GITHUB_OUTPUT
          echo "has_python=$HAS_PYTHON" >> $GITHUB_OUTPUT
          echo "has_proto=$HAS_PROTO" >> $GITHUB_OUTPUT
          echo "has_helm=$HAS_HELM" >> $GITHUB_OUTPUT
          echo "Detected: go=$HAS_GO ts=$HAS_TS python=$HAS_PYTHON proto=$HAS_PROTO helm=$HAS_HELM"

      - name: Install Go doc tools
        if: steps.detect.outputs.has_go == 'true' || steps.detect.outputs.has_proto == 'true' || steps.detect.outputs.has_helm == 'true'
        run: |
          [ "${{ steps.detect.outputs.has_go }}" == "true" ] && go install github.com/princjef/gomarkdoc/cmd/gomarkdoc@latest
          [ "${{ steps.detect.outputs.has_proto }}" == "true" ] && go install github.com/pseudomuto/protoc-gen-doc/cmd/protoc-gen-doc@latest
          [ "${{ steps.detect.outputs.has_helm }}" == "true" ] && go install github.com/norwoodj/helm-docs/cmd/helm-docs@latest
          true

      - name: Install Node doc tools
        if: steps.detect.outputs.has_ts == 'true'
        run: npm install -g typedoc typedoc-plugin-markdown

      - name: Install Python doc tools
        if: steps.detect.outputs.has_python == 'true'
        run: pip install pydoc-markdown

      - name: Generate Go docs
        if: steps.detect.outputs.has_go == 'true'
        continue-on-error: true
        run: |
          mkdir -p docs/go
          go version
          go mod download || true
          # Try ./... first, then fall back to subdirectories
          gomarkdoc ./... > docs/go/packages.md 2>/dev/null || true
          if [ ! -s docs/go/packages.md ]; then
            for dir in ./internal/... ./cmd/... ./pkg/... ./src/...; do
              if ls ${dir%/...} 2>/dev/null | grep -q .; then
                gomarkdoc "$dir" >> docs/go/packages.md 2>/dev/null || true
              fi
            done
          fi
          echo "Go docs: $(wc -c < docs/go/packages.md 2>/dev/null || echo 0) bytes"

      - name: Install project Node dependencies
        if: steps.detect.outputs.has_ts == 'true'
        run: |
          if [ -f "package-lock.json" ]; then
            npm ci --ignore-scripts 2>/dev/null || npm install --ignore-scripts
          elif [ -f "package.json" ]; then
            npm install --ignore-scripts
          fi

      - name: Generate TypeScript docs
        if: steps.detect.outputs.has_ts == 'true'
        continue-on-error: true
        run: |
          mkdir -p docs/ts

          # Determine entry point: use src/ if it exists, otherwise use project root
          ENTRY_POINT="src/"
          [ ! -d "src" ] && ENTRY_POINT="."

          # --skipErrorChecking: bypass TS errors from CSS imports, deprecated options, etc.
          # --entryPointStrategy expand: recursively find all .ts/.tsx files in entry point
          npx typedoc --json docs/ts/typedoc.json \
            --entryPointStrategy expand \
            --skipErrorChecking \
            "$ENTRY_POINT" 2>&1 || true

          npx typedoc --plugin typedoc-plugin-markdown \
            --out docs/ts/markdown \
            --entryPointStrategy expand \
            --skipErrorChecking \
            "$ENTRY_POINT" 2>&1 || true

          echo "TypeScript docs: $(find docs/ts -type f | wc -l) files, $(du -sh docs/ts 2>/dev/null | cut -f1) total"

      - name: Generate Python docs
        if: steps.detect.outputs.has_python == 'true'
        continue-on-error: true
        run: |
          mkdir -p docs/python

          # Find the source root (src/ or project root)
          if [ -d "src" ] && find src -name "*.py" -maxdepth 3 | grep -q .; then
            SRC_ROOT="src"
          else
            SRC_ROOT="."
          fi

          # Document individual .py files (not just __init__.py packages)
          # This catches all actual code, not just empty package markers
          find "$SRC_ROOT" -name "*.py" -maxdepth 4 \
            -not -name "__init__.py" \
            -not -name "conftest.py" \
            -not -name "setup.py" \
            -not -path "*/venv/*" \
            -not -path "*/.venv/*" \
            -not -path "*/__pycache__/*" \
            -not -path "*/node_modules/*" \
            -not -path "*/migrations/*" \
            -not -path "*/test*" | while read -r pyfile; do
            module=$(echo "$pyfile" | sed "s|^${SRC_ROOT}/||; s|/|.|g; s|\.py$||")
            outname=$(echo "$module" | tr '.' '_')
            pydoc-markdown -I "$SRC_ROOT" -m "$module" > "docs/python/${outname}.md" 2>/dev/null || true
          done

          # Remove empty/tiny files (< 100 bytes = just a header)
          find docs/python -name "*.md" -size -100c -delete 2>/dev/null || true

          COUNT=$(find docs/python -name "*.md" -type f | wc -l)
          SIZE=$(du -sh docs/python 2>/dev/null | cut -f1)
          echo "Python docs: ${COUNT} files, ${SIZE} total"

      - name: Generate Protobuf docs
        if: steps.detect.outputs.has_proto == 'true'
        continue-on-error: true
        run: |
          mkdir -p docs/proto
          find . -name "*.proto" -exec protoc --doc_out=docs/proto --doc_opt=json,proto-docs.json {} + || true

      - name: Generate Helm docs
        if: steps.detect.outputs.has_helm == 'true'
        continue-on-error: true
        run: |
          mkdir -p docs/helm
          helm-docs --output-file docs/helm/README.md || true

      - name: Install pipeline dependencies
        run: pip3 install httpx

      - name: Test RAGAnything connectivity
        id: rag_check
        run: |
          echo "Testing RAGAnything at raganything.memory.svc.cluster.local:9621..."
          if curl -sf http://raganything.memory.svc.cluster.local:9621/health --connect-timeout 5 -o /dev/null; then
            echo "RAGAnything is reachable"
            echo "reachable=true" >> $GITHUB_OUTPUT
          else
            echo "WARNING: RAGAnything is NOT reachable from this runner"
            echo "reachable=false" >> $GITHUB_OUTPUT
            echo "Trying alternate DNS..."
            getent hosts raganything.memory.svc.cluster.local || echo "DNS resolution failed"
            curl -sv http://raganything.memory.svc.cluster.local:9621/health --connect-timeout 5 2>&1 || true
          fi

      - name: Transform and ingest into RAGAnything
        if: steps.rag_check.outputs.reachable == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python3 .doc-pipeline/scripts/transform.py docs/ \
            --repo ${{ github.event.repository.name }} \
            --commit ${{ github.sha }} > /tmp/transform-output.jsonl

          DOC_COUNT=$(wc -l < /tmp/transform-output.jsonl)
          echo "Transform produced ${DOC_COUNT} documents"

          if [ "$DOC_COUNT" -eq 0 ]; then
            echo "No documents to ingest"
            exit 0
          fi

          # Convert and ingest each document using temp files (avoids shell arg length limits)
          python3 -c "
          import json, urllib.request, sys
          count = 0
          for line in open('/tmp/transform-output.jsonl'):
              doc = json.loads(line.strip())
              api_doc = {
                  'text': doc.get('content', ''),
                  'file_source': doc.get('metadata', {}).get('repo', 'unknown') + '/' + doc.get('metadata', {}).get('source_file', 'unknown')
              }
              body = json.dumps(api_doc).encode()
              req = urllib.request.Request(
                  'http://raganything.memory.svc.cluster.local:9621/documents/text',
                  data=body,
                  headers={'Content-Type': 'application/json'},
                  method='POST'
              )
              try:
                  resp = urllib.request.urlopen(req, timeout=30)
                  result = json.loads(resp.read())
                  count += 1
                  print(f'Ingested: {api_doc[\"file_source\"][:60]} -> {result.get(\"status\", \"?\")}')
              except Exception as e:
                  print(f'FAILED: {api_doc[\"file_source\"][:60]} -> {e}', file=sys.stderr)
          print(f'Total ingested: {count}')
          "

      - name: Generate and publish Wiki.js pages
        if: steps.rag_check.outputs.reachable == 'true'
        continue-on-error: true
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          WIKIJS_API_KEY: ${{ secrets.WIKIJS_API_KEY }}
        run: |
          FULL_FLAG=""
          if [ "${{ inputs.full_generation }}" == "true" ]; then
            FULL_FLAG="--full"
          fi
          # Also detect [full-docs] in commit message (works with push events where secrets pass through)
          COMMIT_MSG=$(git log -1 --pretty=%B 2>/dev/null || echo "")
          if echo "$COMMIT_MSG" | grep -qi '\[full-docs\]'; then
            echo "Detected [full-docs] in commit message -- enabling full generation"
            FULL_FLAG="--full"
          fi
          python3 .doc-pipeline/scripts/generate_wiki_pages.py \
            --repo ${{ github.event.repository.name }} \
            --docs-dir docs/ \
            --source-dir . \
            --raganything-url http://raganything.memory.svc.cluster.local:9621 \
            --wikijs-url http://wikijs.docs.svc.cluster.local:3000 \
            $FULL_FLAG

      - name: Ingest Wiki.js pages back into RAGAnything
        if: steps.rag_check.outputs.reachable == 'true'
        continue-on-error: true
        env:
          WIKIJS_API_KEY: ${{ secrets.WIKIJS_API_KEY }}
        run: |
          python3 .doc-pipeline/scripts/ingest_wikijs_to_rag.py \
            --wikijs-url http://wikijs.docs.svc.cluster.local:3000 \
            --raganything-url http://raganything.memory.svc.cluster.local:9621
